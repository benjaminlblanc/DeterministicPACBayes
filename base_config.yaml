project_name: "DeterministicPACBayes"
dataset: 'SVMGUIDE'
num_trials: 10
num_workers: 8
is_using_wandb: False

model:
  M: 10
  prior: 0
  pred: "UniformStumps"
  stump_init: "rand"
  samples_prop: 0.5
  max_tree_depth: None
  posterior_std: 0.1
  output: class

training:
  seed: 541944
  lr: 0.1
  batch_size: 1024
  num_epochs: 100
  risk: "Dis_Renyi"
  distribution: "gaussian"
  rand_n: 0
  compute_disintegration: False
  normalize_data: True

bound:
  delta: 0.05
  type: "seeger"
  order: 1.5
  n_grid: 5